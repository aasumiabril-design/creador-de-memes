<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeGen Pro - Movimiento y Recorte Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Arimo:wght@700&family=Bebas+Neue&family=Caveat:wght@700&family=Comic+Neue:wght@700&family=Fira+Sans:wght@900&family=Inter:wght@900&family=Lobster&family=Montserrat:wght@900&family=Open+Sans:wght@800&family=Oswald:wght@700&family=Pacifico&family=Playfair+Display:ital,wght@1,900&family=Raleway:wght@900&family=Roboto+Condensed:wght@700&family=Rubik+Mono+One&family=Staatliches&family=Teko:wght@700&family=Titillium+Web:wght@900&family=Ubuntu:wght@700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap');
        
        body { font-family: 'Source Sans Pro', sans-serif; background-color: #1c1e25; color: white; }
        .scroll::-webkit-scrollbar { width: 6px; }
        .scroll::-webkit-scrollbar-track { background: #2d303a; }
        .scroll::-webkit-scrollbar-thumb { background: #4a4d5a; border-radius: 10px; }

        canvas { max-width: 100%; height: auto; border-radius: 8px; cursor: crosshair; background-color: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .drop-zone { border: 2px dashed #4a4d5a; transition: all 0.3s; }
        .drop-zone:hover { border-color: #699BFF; background: rgba(105, 155, 255, 0.05); }
        
        .font-option { padding: 6px; border-radius: 4px; cursor: pointer; transition: background 0.2s; font-size: 13px; }
        .font-option:hover { background: #3d414d; }
        .meme-thumb { transition: all 0.2s; border: 2px solid transparent; cursor: pointer; }
        .meme-thumb:hover { transform: translateY(-2px); border-color: #699BFF; }

        #cropModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        #cropContainer { background: #1c1e25; padding: 20px; border-radius: 16px; max-width: 90%; max-height: 90%; position: relative; display: flex; flex-direction: column; gap: 15px; }
        #cropCanvas { max-width: 100%; max-height: 70vh; border: 1px solid #4a4d5a; cursor: default; }
    </style>
</head>
<body class="overflow-hidden h-screen flex flex-col">

    <!-- Modal de Recorte -->
    <div id="cropModal">
        <div id="cropContainer">
            <h3 id="cropTitle" class="text-lg font-bold text-[#699BFF]">Recortar Imagen</h3>
            <p class="text-xs text-gray-400">Arrastra las esquinas para ajustar el área de recorte</p>
            <canvas id="cropCanvas"></canvas>
            <div class="flex justify-end gap-3">
                <button onclick="closeCropModal()" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-bold">Cancelar</button>
                <button onclick="applyCrop()" class="px-6 py-2 rounded-lg bg-[#699BFF] hover:bg-[#5284e6] text-sm font-bold">Aplicar Recorte</button>
            </div>
        </div>
    </div>

    <header class="flex-shrink-0 z-30 flex items-center h-16 px-6 border-b border-[#2d303a] bg-[#1c1e25] justify-between">
        <div class="flex items-center gap-4">
            <div class="text-[#699BFF] font-bold text-2xl flex items-center select-none tracking-tighter">
                <span class="mr-2 text-3xl">🎭</span> MEMEGEN <span class="text-white ml-1">PRO</span>
            </div>
            <div class="h-8 w-px bg-[#2d303a] mx-2"></div>
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-bold text-gray-500 uppercase">Nombre:</span>
                <input type="text" id="filenameInput" value="mi-meme-pro" class="bg-[#2d303a] border border-[#4a4d5a] rounded-lg px-3 py-1 text-sm text-white focus:outline-none focus:border-[#699BFF] w-48">
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="downloadMeme()" class="bg-[#699BFF] hover:bg-[#5284e6] text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 transition-all shadow-lg shadow-blue-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                DESCARGAR
            </button>
        </div>
    </header>

    <main class="flex flex-grow overflow-hidden">
        <!-- Panel Izquierdo -->
        <aside class="w-72 border-r border-[#2d303a] bg-[#1c1e25] flex flex-col">
            <div class="p-4 border-b border-[#2d303a] space-y-3">
                <div onclick="triggerMainUpload()" class="drop-zone rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer text-center group bg-[#262931]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1 text-gray-400 group-hover:text-[#699BFF]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span class="text-[10px] font-bold text-gray-400 uppercase">SUBIR DESDE MI EQUIPO</span>
                    <input type="file" id="mainFileInput" accept="image/*" class="hidden" onchange="handleMainUpload(event)">
                </div>
                <button onclick="openCropModal(true)" class="w-full bg-[#2d303a] hover:bg-[#3d414d] border border-[#4a4d5a] rounded-lg py-2 px-3 text-[10px] font-bold uppercase transition-colors flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"/><path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"/></svg>
                    Recortar Fondo
                </button>
                <input type="text" id="memeSearch" onkeyup="filterMemes()" placeholder="Buscar plantilla..." class="w-full bg-[#2d303a] border border-[#4a4d5a] rounded-lg py-2 px-3 text-xs focus:outline-none focus:border-[#699BFF]">
            </div>
            <div id="memeList" class="grid grid-cols-2 gap-2 p-3 overflow-y-auto scroll bg-[#14161a]"></div>
        </aside>

        <!-- Centro -->
        <section class="flex-grow bg-[#0f1115] p-6 flex items-center justify-center overflow-auto relative">
            <div id="canvasWrapper" class="relative">
                <canvas id="memeCanvas"></canvas>
            </div>
            
            <div class="absolute bottom-8 flex gap-3 bg-[#1c1e25]/90 backdrop-blur-md p-3 rounded-2xl border border-[#2d303a] shadow-2xl">
                <button onclick="addTextLayer()" class="flex flex-col items-center gap-1 group">
                    <div class="bg-[#2d303a] p-3 rounded-xl group-hover:bg-[#699BFF] transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
                    </div>
                    <span class="text-[9px] font-bold text-gray-400 uppercase">Texto</span>
                </button>
                <div class="w-px bg-[#2d303a] mx-1"></div>
                <button onclick="triggerOverlayUpload()" class="flex flex-col items-center gap-1 group">
                    <div class="bg-[#2d303a] p-3 rounded-xl group-hover:bg-[#699BFF] transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
                    </div>
                    <span class="text-[9px] font-bold text-gray-400 uppercase">Sticker</span>
                    <input type="file" id="overlayFileInput" accept="image/*" class="hidden" onchange="handleOverlayUpload(event)">
                </button>
            </div>
        </section>

        <!-- Panel Derecho -->
        <aside class="w-80 border-l border-[#2d303a] bg-[#1c1e25] p-5 overflow-y-auto scroll">
            <div id="noSelectionMsg" class="h-full flex flex-col items-center justify-center text-center opacity-40">
                <span class="text-4xl mb-4">🖱️</span>
                <p class="text-sm italic">Selecciona un elemento para editarlo</p>
            </div>

            <div id="editorPanel" class="hidden space-y-6">
                <div class="flex justify-between items-center border-b border-[#2d303a] pb-3">
                    <h2 id="layerTypeTitle" class="text-xs font-black text-[#699BFF] uppercase tracking-widest">Capa</h2>
                    <button onclick="deleteSelectedLayer()" class="text-red-400 hover:text-red-100 bg-red-400/10 p-2 rounded-lg transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </div>

                <div id="imageControls" class="hidden">
                    <button onclick="openCropModal(false)" class="w-full bg-[#2d303a] hover:bg-[#3d414d] border border-[#4a4d5a] rounded-xl py-3 px-4 flex items-center justify-center gap-2 text-sm font-bold transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"/><path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"/></svg>
                        RECORTE DE STICKER
                    </button>
                </div>

                <div id="textControls" class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-wider">Contenido</label>
                        <textarea id="textInput" oninput="updateActiveLayer()" class="w-full bg-[#2d303a] border border-[#4a4d5a] rounded-xl p-3 text-white text-sm focus:outline-none focus:border-[#699BFF] h-20"></textarea>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-wider">Fuente</label>
                        <div id="fontGrid" class="grid grid-cols-1 gap-1 max-h-40 overflow-y-auto scroll bg-[#262931] rounded-xl p-2 border border-[#4a4d5a]"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-2 uppercase">Texto</label>
                            <input type="color" id="textColor" oninput="updateActiveLayer()" class="w-full h-10 bg-[#2d303a] border-0 rounded-lg cursor-pointer">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-2 uppercase">Contorno</label>
                            <input type="color" id="strokeColor" oninput="updateActiveLayer()" class="w-full h-10 bg-[#2d303a] border-0 rounded-lg cursor-pointer">
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label id="sizeLabel" class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Tamaño</label>
                        <input type="range" id="layerSize" min="10" max="1000" oninput="updateActiveLayer()" class="w-full accent-[#699BFF]">
                    </div>

                    <div id="strokeSizeControl">
                        <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase tracking-wider">Grosor Contorno</label>
                        <input type="range" id="strokeSize" min="0" max="40" oninput="updateActiveLayer()" class="w-full accent-[#699BFF]">
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const canvas = document.getElementById('memeCanvas');
        const ctx = canvas.getContext('2d');
        const cropCanvas = document.getElementById('cropCanvas');
        const cropCtx = cropCanvas.getContext('2d');
        
        let activeImage = new Image();
        activeImage.crossOrigin = "anonymous";
        let originalMainImage = null;
        
        let layers = [];
        let selectedLayerIndex = -1;
        let isDragging = false;
        let dragStartX, dragStartY;

        // Variables para recorte
        let isResizingCrop = false;
        let activeCorner = null;
        let cropArea = { x: 50, y: 50, w: 200, h: 200 };
        const CORNER_SIZE = 12;
        let croppingMain = false;

        const templates = [
            { name: "Drake Hotline", url: "https://i.imgflip.com/30b1gx.jpg" },
            { name: "Distracted Boyfriend", url: "https://i.imgflip.com/1ur9b0.jpg" },
            { name: "Two Buttons", url: "https://i.imgflip.com/1g8my4.jpg" },
            { name: "Batman Slapping Robin", url: "https://i.imgflip.com/9ehk.jpg" },
            { name: "Change My Mind", url: "https://i.imgflip.com/24y43o.jpg" },
            { name: "Disaster Girl", url: "https://i.imgflip.com/23ls.jpg" }
        ];

        const fonts = [
            { name: 'Impact', family: 'Impact, sans-serif' },
            { name: 'Montserrat', family: "'Montserrat', sans-serif" },
            { name: 'Bebas Neue', family: "'Bebas Neue', cursive" },
            { name: 'Comic Sans', family: "'Comic Neue', cursive" },
            { name: 'Anton', family: "'Anton', sans-serif" }
        ];

        function init() {
            renderTemplates(templates);
            renderFontOptions();
            loadMeme(templates[0].url);
            setupCanvasEvents();
            setupCropEvents();
        }

        function renderTemplates(list) {
            const container = document.getElementById('memeList');
            container.innerHTML = '';
            list.forEach(m => {
                const div = document.createElement('div');
                div.className = 'meme-thumb bg-[#2d303a] rounded-lg p-1 overflow-hidden';
                div.innerHTML = `<img src="${m.url}" class="w-full h-20 object-cover rounded-md" loading="lazy">`;
                div.onclick = () => loadMeme(m.url);
                container.appendChild(div);
            });
        }

        function renderFontOptions() {
            const grid = document.getElementById('fontGrid');
            fonts.forEach(f => {
                const div = document.createElement('div');
                div.className = 'font-option';
                div.style.fontFamily = f.family;
                div.innerText = f.name;
                div.onclick = () => {
                    if (selectedLayerIndex !== -1 && layers[selectedLayerIndex].type === 'text') {
                        layers[selectedLayerIndex].fontFamily = f.family;
                        drawMeme();
                    }
                };
                grid.appendChild(div);
            });
        }

        function setupCanvasEvents() {
            canvas.onmousedown = (e) => {
                const pos = getMousePos(canvas, e);
                let found = -1;
                for (let i = layers.length - 1; i >= 0; i--) {
                    const l = layers[i];
                    if (l.type === 'text') {
                        ctx.font = `bold ${l.size}px ${l.fontFamily}`;
                        const w = ctx.measureText(l.text.toUpperCase()).width;
                        const h = parseInt(l.size);
                        if (pos.x >= l.x - w/2 && pos.x <= l.x + w/2 && pos.y >= l.y - h && pos.y <= l.y + 10) { found = i; break; }
                    } else {
                        if (pos.x >= l.x && pos.x <= l.x + l.width && pos.y >= l.y && pos.y <= l.y + l.height) { found = i; break; }
                    }
                }
                selectLayer(found);
                if (found !== -1) {
                    isDragging = true;
                    dragStartX = pos.x - layers[found].x;
                    dragStartY = pos.y - layers[found].y;
                }
            };

            window.addEventListener('mousemove', (e) => {
                if (!isDragging || selectedLayerIndex === -1) return;
                const pos = getMousePos(canvas, e);
                layers[selectedLayerIndex].x = pos.x - dragStartX;
                layers[selectedLayerIndex].y = pos.y - dragStartY;
                drawMeme();
            });

            window.addEventListener('mouseup', () => { isDragging = false; });
        }

        function getMousePos(c, e) {
            const rect = c.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (c.width / rect.width),
                y: (e.clientY - rect.top) * (c.height / rect.height)
            };
        }

        function selectLayer(index) {
            selectedLayerIndex = index;
            const panel = document.getElementById('editorPanel');
            const msg = document.getElementById('noSelectionMsg');
            if (index === -1) {
                panel.classList.add('hidden');
                msg.classList.remove('hidden');
            } else {
                panel.classList.remove('hidden');
                msg.classList.add('hidden');
                const layer = layers[index];
                const isText = layer.type === 'text';
                document.getElementById('textControls').classList.toggle('hidden', !isText);
                document.getElementById('imageControls').classList.toggle('hidden', isText);
                document.getElementById('strokeSizeControl').classList.toggle('hidden', !isText);
                document.getElementById('layerTypeTitle').innerText = isText ? "Propiedades de Texto" : "Propiedades de Sticker";
                
                if (isText) {
                    document.getElementById('textInput').value = layer.text;
                    document.getElementById('layerSize').value = layer.size;
                    document.getElementById('strokeSize').value = layer.strokeSize;
                    document.getElementById('textColor').value = layer.color;
                    document.getElementById('strokeColor').value = layer.stroke;
                } else {
                    document.getElementById('layerSize').value = layer.width;
                }
            }
            drawMeme();
        }

        function openCropModal(isMain) {
            croppingMain = isMain;
            let imgToCrop = isMain ? (originalMainImage || activeImage) : layers[selectedLayerIndex].originalImg;
            if (!imgToCrop) return;

            document.getElementById('cropTitle').innerText = isMain ? "Recortar Fondo" : "Recortar Sticker";
            const modal = document.getElementById('cropModal');
            modal.style.display = 'flex';
            
            cropCanvas.width = imgToCrop.width;
            cropCanvas.height = imgToCrop.height;
            
            cropArea = { x: imgToCrop.width * 0.1, y: imgToCrop.height * 0.1, w: imgToCrop.width * 0.8, h: imgToCrop.height * 0.8 };
            drawCrop(imgToCrop);
        }

        function setupCropEvents() {
            cropCanvas.onmousedown = (e) => {
                const pos = getMousePos(cropCanvas, e);
                activeCorner = getActiveCorner(pos);
                if (activeCorner) isResizingCrop = true;
            };

            window.addEventListener('mousemove', (e) => {
                if (!isResizingCrop) return;
                const pos = getMousePos(cropCanvas, e);
                
                if (activeCorner === 'tl') {
                    const dx = pos.x - cropArea.x; const dy = pos.y - cropArea.y;
                    cropArea.x = pos.x; cropArea.y = pos.y;
                    cropArea.w -= dx; cropArea.h -= dy;
                } else if (activeCorner === 'tr') {
                    cropArea.w = pos.x - cropArea.x; const dy = pos.y - cropArea.y;
                    cropArea.y = pos.y; cropArea.h -= dy;
                } else if (activeCorner === 'bl') {
                    const dx = pos.x - cropArea.x; cropArea.x = pos.x; cropArea.w -= dx;
                    cropArea.h = pos.y - cropArea.y;
                } else if (activeCorner === 'br') {
                    cropArea.w = pos.x - cropArea.x; cropArea.h = pos.y - cropArea.y;
                }
                
                if (cropArea.w < 20) cropArea.w = 20; if (cropArea.h < 20) cropArea.h = 20;
                let imgToCrop = croppingMain ? (originalMainImage || activeImage) : layers[selectedLayerIndex].originalImg;
                drawCrop(imgToCrop);
            });

            window.addEventListener('mouseup', () => { isResizingCrop = false; activeCorner = null; });
        }

        function getActiveCorner(pos) {
            const corners = {
                tl: { x: cropArea.x, y: cropArea.y }, tr: { x: cropArea.x + cropArea.w, y: cropArea.y },
                bl: { x: cropArea.x, y: cropArea.y + cropArea.h }, br: { x: cropArea.x + cropArea.w, y: cropArea.y + cropArea.h }
            };
            for (const [id, c] of Object.entries(corners)) {
                if (Math.abs(pos.x - c.x) < CORNER_SIZE*2 && Math.abs(pos.y - c.y) < CORNER_SIZE*2) return id;
            }
            return null;
        }

        function drawCrop(img) {
            cropCtx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
            cropCtx.drawImage(img, 0, 0);
            cropCtx.fillStyle = 'rgba(0,0,0,0.7)';
            cropCtx.fillRect(0, 0, cropCanvas.width, cropArea.y);
            cropCtx.fillRect(0, cropArea.y + cropArea.h, cropCanvas.width, cropCanvas.height - (cropArea.y + cropArea.h));
            cropCtx.fillRect(0, cropArea.y, cropArea.x, cropArea.h);
            cropCtx.fillRect(cropArea.x + cropArea.w, cropArea.y, cropCanvas.width - (cropArea.x + cropArea.w), cropArea.h);
            cropCtx.strokeStyle = '#699BFF'; cropCtx.lineWidth = 2;
            cropCtx.strokeRect(cropArea.x, cropArea.y, cropArea.w, cropArea.h);
            cropCtx.fillStyle = '#699BFF';
            [{x: cropArea.x, y: cropArea.y}, {x: cropArea.x + cropArea.w, y: cropArea.y}, {x: cropArea.x, y: cropArea.y + cropArea.h}, {x: cropArea.x + cropArea.w, y: cropArea.y + cropArea.h}].forEach(c => {
                cropCtx.beginPath(); cropCtx.arc(c.x, c.y, CORNER_SIZE/2, 0, Math.PI*2); cropCtx.fill();
            });
        }

        function applyCrop() {
            const x = Math.max(0, cropArea.x), y = Math.max(0, cropArea.y);
            const w = Math.min(cropArea.w, cropCanvas.width - x), h = Math.min(cropArea.h, cropCanvas.height - y);
            const tempC = document.createElement('canvas'); tempC.width = w; tempC.height = h;
            const sourceImg = croppingMain ? (originalMainImage || activeImage) : layers[selectedLayerIndex].originalImg;
            tempC.getContext('2d').drawImage(sourceImg, x, y, w, h, 0, 0, w, h);
            const newImg = new Image(); newImg.src = tempC.toDataURL();
            newImg.onload = () => {
                if (croppingMain) {
                    activeImage = newImg;
                    const max = 1000; let cw = activeImage.width, ch = activeImage.height;
                    if (cw > max) { ch = (max/cw)*ch; cw = max; }
                    canvas.width = cw; canvas.height = ch;
                    closeCropModal(); drawMeme();
                } else {
                    const l = layers[selectedLayerIndex]; l.img = newImg; l.originalRatio = h / w;
                    l.height = l.width * l.originalRatio;
                    closeCropModal(); drawMeme();
                }
            };
        }

        function closeCropModal() { document.getElementById('cropModal').style.display = 'none'; }

        function loadMeme(url) {
            const img = new Image(); img.crossOrigin = "anonymous"; img.src = url;
            img.onload = () => {
                originalMainImage = img; activeImage = img;
                const max = 1000; let w = activeImage.width, h = activeImage.height;
                if (w > max) { h = (max/w)*h; w = max; }
                canvas.width = w; canvas.height = h;
                drawMeme();
            };
        }

        function drawMeme() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (activeImage.src) ctx.drawImage(activeImage, 0, 0, canvas.width, canvas.height);
            layers.forEach((l, i) => {
                if (l.type === 'text') {
                    ctx.textAlign = 'center'; ctx.lineJoin = 'round';
                    ctx.font = `bold ${l.size}px ${l.fontFamily}`;
                    const txt = l.text.toUpperCase();
                    if (l.strokeSize > 0) { ctx.strokeStyle = l.stroke; ctx.lineWidth = l.strokeSize; ctx.strokeText(txt, l.x, l.y); }
                    ctx.fillStyle = l.color; ctx.fillText(txt, l.x, l.y);
                } else { ctx.drawImage(l.img, l.x, l.y, l.width, l.height); }
                if (i === selectedLayerIndex) {
                    ctx.strokeStyle = '#699BFF'; ctx.lineWidth = 2; ctx.setLineDash([5,5]);
                    if (l.type === 'text') {
                        const m = ctx.measureText(l.text.toUpperCase());
                        ctx.strokeRect(l.x - m.width/2 - 5, l.y - l.size, m.width + 10, parseInt(l.size) + 15);
                    } else { ctx.strokeRect(l.x - 2, l.y - 2, l.width + 4, l.height + 4); }
                    ctx.setLineDash([]);
                }
            });
        }

        function addTextLayer() {
            layers.push({ type:'text', text:'TEXTO AQUÍ', x:canvas.width/2, y:canvas.height/2, size:60, strokeSize:8, color:'#ffffff', stroke:'#000000', fontFamily:'Impact, sans-serif' });
            selectLayer(layers.length-1);
        }

        function triggerOverlayUpload() { document.getElementById('overlayFileInput').click(); }
        function handleOverlayUpload(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const img = new Image(); img.src = ev.target.result;
                img.onload = () => {
                    layers.push({ type:'image', img:img, originalImg:img, x:50, y:50, width:200, height:200*(img.height/img.width), originalRatio:img.height/img.width });
                    selectLayer(layers.length-1);
                };
            };
            r.readAsDataURL(f);
        }

        function updateActiveLayer() {
            if (selectedLayerIndex === -1) return;
            const l = layers[selectedLayerIndex];
            if (l.type === 'text') {
                l.text = document.getElementById('textInput').value;
                l.size = document.getElementById('layerSize').value;
                l.strokeSize = document.getElementById('strokeSize').value;
                l.color = document.getElementById('textColor').value;
                l.stroke = document.getElementById('strokeColor').value;
            } else {
                l.width = parseInt(document.getElementById('layerSize').value);
                l.height = l.width * l.originalRatio;
            }
            drawMeme();
        }

        function deleteSelectedLayer() { if(selectedLayerIndex !== -1) { layers.splice(selectedLayerIndex, 1); selectLayer(-1); } }
        function triggerMainUpload() { document.getElementById('mainFileInput').click(); }
        function handleMainUpload(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader(); r.onload = (ev) => {
                const img = new Image(); img.src = ev.target.result;
                img.onload = () => {
                    originalMainImage = img; activeImage = img;
                    const max = 1000; let w = activeImage.width, h = activeImage.height;
                    if (w > max) { h = (max/w)*h; w = max; }
                    canvas.width = w; canvas.height = h;
                    drawMeme();
                }
            };
            r.readAsDataURL(f);
        }
        function filterMemes() {
            const t = document.getElementById('memeSearch').value.toLowerCase();
            renderTemplates(templates.filter(m => m.name.toLowerCase().includes(t)));
        }
        function downloadMeme() {
            const old = selectedLayerIndex; selectedLayerIndex = -1; drawMeme();
            const fileName = document.getElementById('filenameInput').value.trim() || 'mi-meme';
            setTimeout(() => {
                const a = document.createElement('a');
                a.download = `${fileName}.png`; a.href = canvas.toDataURL(); a.click();
                selectedLayerIndex = old; drawMeme();
            }, 50);
        }

        window.onload = init;
    </script>
</body>
</html>
